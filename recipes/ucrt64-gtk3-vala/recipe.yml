---
  version: 1.0

  arch: ucrt64

  msys2-version: ">3.6.5"

  steps:
    - name: "#1"
      description: "Update MSYS2 packages"
      commands: 
        - "sh -c 'pacman -Syu --noconfirm'"
    
    - name: '#2'
      description: "Install Vala as a programming paradigm along with some useful GNU tools."
      packages:
        - "base-devel"
        - "git"
        - "meson"
        - "vala"
    
    - name: "#3"
      description: "Install mingw-w64-ucrt-x86_64-toolchain and build dependencies for GTK3."
      packages:
        - "mingw-w64-ucrt-x86_64-toolchain"
        - "mingw-w64-ucrt-x86_64-cc"
        - "mingw-w64-ucrt-x86_64-libxslt"
        - "mingw-w64-ucrt-x86_64-cmake-gui"
        - "mingw-w64-ucrt-x86_64-git-gui"
        - "mingw-w64-ucrt-x86_64-cc"
        - "mingw-w64-ucrt-x86_64-gobject-introspection"
        - "mingw-w64-ucrt-x86_64-gtk-doc"
        - "mingw-w64-ucrt-x86_64-libxslt"
        - "mingw-w64-ucrt-x86_64-meson"
        - "mingw-w64-ucrt-x86_64-nasm"
        - "mingw-w64-ucrt-x86_64-ninja"
        - "mingw-w64-ucrt-x86_64-pkgconf"
        - "mingw-w64-ucrt-x86_64-sassc"
        - "mingw-w64-ucrt-x86_64-libxslt"
        - "mingw-w64-ucrt-x86_64-vala"
        - "mingw-w64-ucrt-x86_64-vala-language-server"
     
    - name: "#4"
      description: "Add required UI libraries for GTK3 [mingw-w64-ucrt-x86_64-gtk3] development plus plugins."
      packages:
        - "mingw-w64-ucrt-x86_64-gtk3"
        - "mingw-w64-ucrt-x86_64-gtk-update-icon-cache"
        - "mingw-w64-ucrt-x86_64-gst-plugin-gtk"
        - "mingw-w64-ucrt-x86_64-gst-plugins-good"

    - name: "#5"
      description: "Add assets to MSYS2 installation."
      files:
        - 'gtk-3.20':
            target_dir: '/usr/local/share/themes/Windows10/'
        
