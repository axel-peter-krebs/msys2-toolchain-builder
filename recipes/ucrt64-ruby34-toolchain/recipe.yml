---
  version: 1.0

  arch: ucrt64

  msys2-version: ">3.6.5"

  steps:
    - name: "#1"
      description: "Build dependencies"
      packages:
        - "base-devel"
        - "libgc"
        - "libguile"
        - "mingw-w64-ucrt-x86_64-autotools"
        - "mingw-w64-ucrt-x86_64-binutils"
        - "mingw-w64-ucrt-x86_64-cc"
        - "mingw-w64-ucrt-x86_64-crt"
        - "mingw-w64-ucrt-x86_64-gcc"
        - "mingw-w64-ucrt-x86_64-gcc-libs"
        - "mingw-w64-ucrt-x86_64-gettext-runtime"
        - "mingw-w64-ucrt-x86_64-headers"
        - "mingw-w64-ucrt-x86_64-isl"
        - "mingw-w64-ucrt-x86_64-libiconv"
        - "mingw-w64-ucrt-x86_64-libmangle"
        - "mingw-w64-ucrt-x86_64-libwinpthread"
        - "mingw-w64-ucrt-x86_64-make"
        - "mingw-w64-ucrt-x86_64-mpc"
        - "mingw-w64-ucrt-x86_64-mpfr"
        - "mingw-w64-ucrt-x86_64-pkgconf"
        - "mingw-w64-ucrt-x86_64-tools"
        - "mingw-w64-ucrt-x86_64-windows-default-manifest"
        - "mingw-w64-ucrt-x86_64-winpthreads"
        
      commands:
        - "sh -c 'pacman -Syu --noconfirm'"

    - name: "#2"
      description: "Install Ruby"
      packages: 
        - "mingw-w64-ucrt-x86_64-ruby"
      commands:
        - "sh -c 'pacman -Suu'"
    
    - name: "#3"
      description: "Optional frameworks"
      packages: 
        - "mingw-w64-ucrt-x86_64-aria2"
        - "mingw-w64-ucrt-x86_64-asciidoctor"
        - "mingw-w64-ucrt-x86_64-emscripten"
        - "mingw-w64-ucrt-x86_64-groonga"
        - "mingw-w64-ucrt-x86_64-mkvtoolnix-cli"
        - "mingw-w64-ucrt-x86_64-mkvtoolnix-gui"
        - "mingw-w64-ucrt-x86_64-mruby"
        - "mingw-w64-ucrt-x86_64-ngraph-gtk"
        - "mingw-w64-ucrt-x86_64-qtwebkit"
        - "mingw-w64-ucrt-x86_64-ruby-dbus"
        - "mingw-w64-ucrt-x86_64-ruby-mustache"
        - "mingw-w64-ucrt-x86_64-ruby-native-package-installer"
        - "mingw-w64-ucrt-x86_64-ruby-pkg-config"
        - "mingw-w64-ucrt-x86_64-ruby-rake-compiler"
        - "mingw-w64-ucrt-x86_64-ruby-rdiscount"
        - "mingw-w64-ucrt-x86_64-swig"
        - "mingw-w64-ucrt-x86_64-texlive-core"
        
    - name: "#4"
      description: "Set environment variables for gem building to HOME."
      files:
        - '099-ruby-gems-home.sh':
            target_dir: '/etc/profile.d'