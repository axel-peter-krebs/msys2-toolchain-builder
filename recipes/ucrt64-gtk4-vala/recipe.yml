---
  version: 1.0

  arch: ucrt64

  msys2-version: ">3.6.5"

  steps:
    - name: "#1"
      description: "Update MSYS2 packages"
      commands: 
        - "sh -c 'pacman -Syu --noconfirm'"

    - name: "#2"
      description: "Install mingw-w64-ucrt-x86_64-toolchain and GTK build dependencies."
      packages: 
        - "mingw-w64-ucrt-x86_64-toolchain"
        - "mingw-w64-ucrt-x86_64-cc"
        - "mingw-w64-ucrt-x86_64-libxslt"
        - "mingw-w64-ucrt-x86_64-meson"
        - "mingw-w64-ucrt-x86_64-nasm"
        - "mingw-w64-ucrt-x86_64-ninja"
        - "mingw-w64-ucrt-x86_64-pkgconf"
        - "mingw-w64-ucrt-x86_64-cmake-gui"
        - "mingw-w64-ucrt-x86_64-git-gui"
        - "mingw-w64-ucrt-x86_64-vala"
        - "mingw-w64-ucrt-x86_64-vala-language-server"

    - name: "#3"
      description: "Add required UI libraries for GTK4 [mingw-w64-ucrt-x86_64-gtk3] development."
      packages:
        - "mingw-w64-ucrt-x86_64-gtk4"
        - "mingw-w64-ucrt-x86_64-gst-plugins-good"
        
    - name: '#4'
      description: "Install Vala as a programming paradigm along with some useful GNU tools."
      packages:
        - "git"
        - "guile"
        - "meson"
        - "vala"
        
